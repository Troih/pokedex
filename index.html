<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #CC0000;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #CC0000;
      padding: 20px 16px 14px;
      text-align: center;
      border-bottom: 5px solid #000;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .blue-orb {
      width: 44px;
      height: 44px;
      background: radial-gradient(circle at 35% 35%, #6fa8ff, #3B4CCA);
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 0 12px #3B4CCA, 0 0 0 2px #000;
      flex-shrink: 0;
    }

    h1 {
      color: #fff;
      font-size: clamp(1.2rem, 5vw, 2rem);
      text-shadow: 3px 3px 0 #000;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #FFD700;
      font-size: clamp(0.45rem, 2vw, 0.65rem);
      margin-top: 10px;
      text-shadow: 1px 1px 0 #000;
    }

    /* ── Main panel ── */
    .panel {
      background: #AAAAAA;
      border-top: 5px solid #000;
      border-bottom: 5px solid #000;
      padding: 12px;
    }

    .screen {
      background: #E8E8E8;
      border: 4px solid #222;
      border-radius: 6px;
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 3px solid #222;
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s, border-color 0.15s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .card:active {
      transform: scale(0.96);
      box-shadow: none;
    }

    .card.speaking {
      background: #FFFBE6;
      border-color: #FFD700;
      box-shadow: 0 0 0 3px #FFD700, 0 6px 18px rgba(255,215,0,0.4);
      animation: bounce 0.35s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .card-number {
      font-size: 0.45rem;
      color: #888;
      margin-bottom: 4px;
    }

    .card img {
      width: 100px;
      height: 100px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto;
    }

    .card-name {
      font-size: 0.48rem;
      color: #222;
      margin-top: 6px;
      line-height: 1.4;
      min-height: 1.4em;
      text-transform: capitalize;
    }

    .sound-icon {
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card:hover .sound-icon,
    .card.speaking .sound-icon {
      opacity: 1;
    }

    /* ── Footer strip ── */
    footer {
      text-align: center;
      padding: 14px;
      color: #fff;
      font-size: 0.45rem;
      text-shadow: 1px 1px 0 #000;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="blue-orb"></div>
    <h1>POKÉDEX</h1>
  </div>
  <p class="subtitle">Tap a Pokémon to hear its name!</p>
</header>

<div class="panel">
  <div class="screen">
    <div class="grid" id="grid"></div>
  </div>
</div>

<footer>GEN 1 &nbsp;·&nbsp; 151 POKÉMON</footer>

<script>
  const POKEMON = [
    "Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard",
    "Squirtle","Wartortle","Blastoise","Caterpie","Metapod","Butterfree",
    "Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot",
    "Rattata","Raticate","Spearow","Fearow","Ekans","Arbok",
    "Pikachu","Raichu","Sandshrew","Sandslash","Nidoran","Nidorina",
    "Nidoqueen","Nidoran","Nidorino","Nidoking","Clefairy","Clefable",
    "Vulpix","Ninetales","Jigglypuff","Wigglytuff","Zubat","Golbat",
    "Oddish","Gloom","Vileplume","Paras","Parasect","Venonat",
    "Venomoth","Diglett","Dugtrio","Meowth","Persian","Psyduck",
    "Golduck","Mankey","Primeape","Growlithe","Arcanine","Poliwag",
    "Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam","Machop",
    "Machoke","Machamp","Bellsprout","Weepinbell","Victreebel","Tentacool",
    "Tentacruel","Geodude","Graveler","Golem","Ponyta","Rapidash",
    "Slowpoke","Slowbro","Magnemite","Magneton","Farfetch'd","Doduo",
    "Dodrio","Seel","Dewgong","Grimer","Muk","Shellder",
    "Cloyster","Gastly","Haunter","Gengar","Onix","Drowzee",
    "Hypno","Krabby","Kingler","Voltorb","Electrode","Exeggcute",
    "Exeggutor","Cubone","Marowak","Hitmonlee","Hitmonchan","Lickitung",
    "Koffing","Weezing","Rhyhorn","Rhydon","Chansey","Tangela",
    "Kangaskhan","Horsea","Seadra","Goldeen","Seaking","Staryu",
    "Starmie","Mr. Mime","Scyther","Jynx","Electabuzz","Magmar",
    "Pinsir","Tauros","Magikarp","Gyarados","Lapras","Ditto",
    "Eevee","Vaporeon","Jolteon","Flareon","Porygon","Omanyte",
    "Omastar","Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno",
    "Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew"
  ];

  const SPRITE_BASE = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/";

  let voices = [];

  function loadVoices() {
    voices = window.speechSynthesis.getVoices();
  }

  if ('speechSynthesis' in window) {
    loadVoices();
    window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
  } else {
    document.querySelector('.subtitle').textContent = "⚠️ Your browser does not support text-to-speech.";
  }

  function speak(name) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();

    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(name);
      u.lang = "en-US";
      u.rate = 0.88;
      u.pitch = 1.1;

      const englishVoice = voices.find(v => v.lang.startsWith("en"));
      if (englishVoice) u.voice = englishVoice;

      window.speechSynthesis.speak(u);
    }, 50);
  }

  const grid = document.getElementById("grid");

  POKEMON.forEach((name, i) => {
    const id = i + 1;
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-number">#${String(id).padStart(3, "0")}</div>
      <img src="${SPRITE_BASE}${id}.png" alt="${name}" loading="lazy" />
      <div class="card-name">${name}</div>
      <span class="sound-icon">🔊</span>
    `;

    card.addEventListener("click", () => {
      document.querySelectorAll(".card.speaking").forEach(c => c.classList.remove("speaking"));
      card.classList.add("speaking");
      speak(name);
      card.addEventListener("animationend", () => card.classList.remove("speaking"), { once: true });
    });

    grid.appendChild(card);
  });
</script>
</body>
</html>
