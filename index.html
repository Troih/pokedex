<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #CC0000;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #CC0000;
      padding: 20px 16px 14px;
      text-align: center;
      border-bottom: 5px solid #000;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .blue-orb {
      width: 44px;
      height: 44px;
      background: radial-gradient(circle at 35% 35%, #6fa8ff, #3B4CCA);
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 0 12px #3B4CCA, 0 0 0 2px #000;
      flex-shrink: 0;
    }

    h1 {
      color: #fff;
      font-size: clamp(1.2rem, 5vw, 2rem);
      text-shadow: 3px 3px 0 #000;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #FFD700;
      font-size: clamp(0.45rem, 2vw, 0.65rem);
      margin-top: 10px;
      text-shadow: 1px 1px 0 #000;
    }

    /* ── Main panel ── */
    .panel {
      background: #AAAAAA;
      border-top: 5px solid #000;
      border-bottom: 5px solid #000;
      padding: 12px;
    }

    .screen {
      background: #E8E8E8;
      border: 4px solid #222;
      border-radius: 6px;
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 3px solid #222;
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s, border-color 0.15s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .card:active {
      transform: scale(0.96);
      box-shadow: none;
    }

    .card.speaking {
      background: #FFFBE6;
      border-color: #FFD700;
      box-shadow: 0 0 0 3px #FFD700, 0 6px 18px rgba(255,215,0,0.4);
      animation: bounce 0.35s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .card-number {
      font-size: 0.45rem;
      color: #888;
      margin-bottom: 4px;
    }

    .card img {
      width: 100px;
      height: 100px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto;
    }

    .card-name {
      font-size: 0.48rem;
      color: #222;
      margin-top: 6px;
      line-height: 1.4;
      min-height: 1.4em;
      text-transform: capitalize;
    }

    .sound-icon {
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card:hover .sound-icon,
    .card.speaking .sound-icon {
      opacity: 1;
    }

    /* ── Footer strip ── */
    footer {
      text-align: center;
      padding: 14px;
      color: #fff;
      font-size: 0.45rem;
      text-shadow: 1px 1px 0 #000;
      opacity: 0.8;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal {
      background: #fff;
      border: 5px solid #000;
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      position: relative;
      animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 220px;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-number {
      font-size: 0.5rem;
      color: #888;
      margin-bottom: 8px;
    }

    .modal-img {
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto;
      animation: float 1s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .modal-name {
      font-size: 1rem;
      color: #222;
      margin-top: 16px;
      text-shadow: 2px 2px 0 #ddd;
    }

    .modal-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
      cursor: pointer;
      color: #888;
    }

    .modal-close:hover { color: #CC0000; }

    .modal-more-btn {
      margin-top: 18px;
      background: #CC0000;
      color: #fff;
      border: 3px solid #000;
      border-radius: 8px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.55rem;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-more-btn:hover { background: #aa0000; }
    .modal-more-btn:disabled { background: #888; cursor: default; }

    .modal-desc {
      display: none;
      margin-top: 16px;
      font-family: sans-serif;
      font-size: 0.85rem;
      color: #333;
      line-height: 1.6;
      max-width: 280px;
      text-align: left;
      border-top: 2px solid #eee;
      padding-top: 12px;
    }

    .modal-desc.visible { display: block; }

    .desc-replay-btn {
      margin-top: 10px;
      background: none;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.45rem;
      padding: 6px 10px;
      cursor: pointer;
      color: #666;
    }

    .desc-replay-btn:hover { border-color: #CC0000; color: #CC0000; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="blue-orb"></div>
    <h1>POKÉDEX</h1>
  </div>
  <p class="subtitle">Tap a Pokémon to hear its name!</p>
</header>

<div class="panel">
  <div class="screen">
    <div class="grid" id="grid"></div>
  </div>
</div>

<footer>GEN 1 &nbsp;·&nbsp; 151 POKÉMON</footer>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-number" id="modal-number"></div>
    <img class="modal-img" id="modal-img" src="" alt="" />
    <div class="modal-name" id="modal-name"></div>
    <button class="modal-more-btn" id="modal-more-btn">Mer info</button>
    <div class="modal-desc" id="modal-desc"></div>
    <button class="desc-replay-btn" id="desc-replay-btn" style="display:none">🔊 Läs upp igen</button>
  </div>
</div>

<script>
  const POKEMON = [
    "Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard",
    "Squirtle","Wartortle","Blastoise","Caterpie","Metapod","Butterfree",
    "Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot",
    "Rattata","Raticate","Spearow","Fearow","Ekans","Arbok",
    "Pikachu","Raichu","Sandshrew","Sandslash","Nidoran","Nidorina",
    "Nidoqueen","Nidoran","Nidorino","Nidoking","Clefairy","Clefable",
    "Vulpix","Ninetales","Jigglypuff","Wigglytuff","Zubat","Golbat",
    "Oddish","Gloom","Vileplume","Paras","Parasect","Venonat",
    "Venomoth","Diglett","Dugtrio","Meowth","Persian","Psyduck",
    "Golduck","Mankey","Primeape","Growlithe","Arcanine","Poliwag",
    "Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam","Machop",
    "Machoke","Machamp","Bellsprout","Weepinbell","Victreebel","Tentacool",
    "Tentacruel","Geodude","Graveler","Golem","Ponyta","Rapidash",
    "Slowpoke","Slowbro","Magnemite","Magneton","Farfetch'd","Doduo",
    "Dodrio","Seel","Dewgong","Grimer","Muk","Shellder",
    "Cloyster","Gastly","Haunter","Gengar","Onix","Drowzee",
    "Hypno","Krabby","Kingler","Voltorb","Electrode","Exeggcute",
    "Exeggutor","Cubone","Marowak","Hitmonlee","Hitmonchan","Lickitung",
    "Koffing","Weezing","Rhyhorn","Rhydon","Chansey","Tangela",
    "Kangaskhan","Horsea","Seadra","Goldeen","Seaking","Staryu",
    "Starmie","Mr. Mime","Scyther","Jynx","Electabuzz","Magmar",
    "Pinsir","Tauros","Magikarp","Gyarados","Lapras","Ditto",
    "Eevee","Vaporeon","Jolteon","Flareon","Porygon","Omanyte",
    "Omastar","Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno",
    "Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew"
  ];

  const SPRITE_BASE    = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/";
  const ANIMATED_BASE  = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/";

  let currentAudio = null;

  const backdrop   = document.getElementById("modal-backdrop");
  const modalImg   = document.getElementById("modal-img");
  const modalName  = document.getElementById("modal-name");
  const modalNum   = document.getElementById("modal-number");
  const moreBtn    = document.getElementById("modal-more-btn");
  const modalDesc  = document.getElementById("modal-desc");
  const replayBtn  = document.getElementById("desc-replay-btn");

  const descCache = {};
  let currentId = null;

  function openModal(id, name) {
    currentId = id;
    modalNum.textContent  = `#${String(id).padStart(3, "0")}`;
    modalImg.src          = `${ANIMATED_BASE}${id}.gif`;
    modalImg.alt          = name;
    modalName.textContent = name;
    modalDesc.classList.remove("visible");
    modalDesc.textContent   = "";
    replayBtn.style.display = "none";
    moreBtn.style.display   = "inline-block";
    moreBtn.disabled        = false;
    moreBtn.textContent     = "Mer info";
    backdrop.classList.add("open");
  }

  function closeModal() {
    backdrop.classList.remove("open");
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    if (currentDescAudio) {
      currentDescAudio.pause();
      currentDescAudio.currentTime = 0;
      currentDescAudio = null;
    }
  }

  let currentDescAudio = null;

  function speakSwedish(id) {
    if (currentDescAudio) {
      currentDescAudio.pause();
      currentDescAudio.currentTime = 0;
    }
    currentDescAudio = new Audio(`sounds/desc_${id}.mp3`);
    currentDescAudio.play();
  }

  async function fetchDescription(id) {
    if (descCache[id]) return descCache[id];
    const res  = await fetch(`sounds/desc_${id}.txt`);
    const text = await res.text();
    descCache[id] = text.trim();
    return descCache[id];
  }

  moreBtn.addEventListener("click", async () => {
    moreBtn.disabled    = true;
    moreBtn.textContent = "Laddar...";
    try {
      const text = await fetchDescription(currentId);
      modalDesc.textContent   = text;
      modalDesc.classList.add("visible");
      moreBtn.style.display   = "none";
      replayBtn.style.display = "inline-block";
      speakSwedish(currentId);
    } catch {
      modalDesc.textContent = "Kunde inte hämta information just nu.";
      modalDesc.classList.add("visible");
      moreBtn.style.display = "none";
    }
  });

  replayBtn.addEventListener("click", () => speakSwedish(currentId));

  document.getElementById("modal-close").addEventListener("click", closeModal);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function speak(id) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    currentAudio = new Audio(`sounds/${id}.mp3`);
    currentAudio.play();
  }

  const grid = document.getElementById("grid");

  POKEMON.forEach((name, i) => {
    const id = i + 1;
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-number">#${String(id).padStart(3, "0")}</div>
      <img src="${SPRITE_BASE}${id}.png" alt="${name}" loading="lazy" />
      <div class="card-name">${name}</div>
      <span class="sound-icon">🔊</span>
    `;

    card.addEventListener("click", () => {
      document.querySelectorAll(".card.speaking").forEach(c => c.classList.remove("speaking"));
      card.classList.add("speaking");
      card.addEventListener("animationend", () => card.classList.remove("speaking"), { once: true });
      openModal(id, name);
      speak(id);
    });

    grid.appendChild(card);
  });
</script>
</body>
</html>
